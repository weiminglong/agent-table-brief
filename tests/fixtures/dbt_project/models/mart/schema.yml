version: 2

models:
  - name: daily_active_users
    description: Daily active users by product surface
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - activity_date
            - user_id
    columns:
      - name: activity_date
        description: Date of user activity
        tests: [not_null]
      - name: user_id
        description: Unique user identifier
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: email
        description: User email address
        tags: [pii]
  - name: daily_active_users_all
    description: Daily active users including employees
  - name: dim_users
    description: User dimension
